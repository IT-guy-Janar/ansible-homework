# Install and configure Elasticsearch node

- name: Update all available packages
  dnf:
    name: "*"
    state: latest

- name: Install firewalld and python3-firewall
  dnf:
    name:
      - firewalld
      - python3-firewall
    state: present

- name: Enable and start firewalld
  systemd:
    name: firewalld
    enabled: true
    state: started

- name: Import Elasticsearch GPG key
  rpm_key:
    key: https://artifacts.elastic.co/GPG-KEY-elasticsearch
    state: present

- name: Add Elasticsearch repository
  copy:
    dest: /etc/yum.repos.d/elasticsearch.repo
    content: |
      [elasticsearch]
      name=Elasticsearch repository
      baseurl=https://artifacts.elastic.co/packages/8.x/yum
      gpgcheck=1
      gpgkey=https://artifacts.elastic.co/GPG-KEY-elasticsearch
      enabled=1
      autorefresh=1
      type=rpm-md

- name: Install Elasticsearch
  dnf:
    name: elasticsearch
    state: latest

- name: Create TLS certificate directory
  file:
    path: "{{ es_cert_dir }}"
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: '0750'

- name: Generate TLS private key
  command: >
    openssl genrsa -out {{ es_cert_dir }}/elasticsearch.key 2048
  args:
    creates: "{{ es_cert_dir }}/elasticsearch.key"

- name: Generate OpenSSL config with SAN
  copy:
    dest: "{{ es_cert_dir }}/openssl.cnf"
    content: |
      [req]
      distinguished_name = req_distinguished_name
      x509_extensions = v3_req
      prompt = no

      [req_distinguished_name]
      CN = {{ inventory_hostname }}

      [v3_req]
      subjectAltName = @alt_names

      [alt_names]
      DNS.1 = {{ inventory_hostname }}
      IP.1 = {{ ansible_host }}

- name: Generate TLS certificate with SAN
  command: >
    openssl req -new -x509
    -key {{ es_cert_dir }}/elasticsearch.key
    -out {{ es_cert_dir }}/elasticsearch.crt
    -days {{ es_cert_validity_days }}
    -config {{ es_cert_dir }}/openssl.cnf
  args:
    creates: "{{ es_cert_dir }}/elasticsearch.crt"

- name: Set correct permissions on TLS files
  file:
    path: "{{ item }}"
    owner: elasticsearch
    group: elasticsearch
    mode: '0640'
  loop:
    - "{{ es_cert_dir }}/elasticsearch.key"
    - "{{ es_cert_dir }}/elasticsearch.crt"

- name: Deploy elasticsearch.yml configuration
  template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: elasticsearch
    group: elasticsearch
    mode: '0660'
  notify: restart elasticsearch

- name: Enable and start Elasticsearch service
  systemd:
    name: elasticsearch
    enabled: true
    state: started

# Configure firewall
- name: Allow Elasticsearch HTTP port through firewall
  firewalld:
    port: "{{ es_http_port }}/tcp"
    permanent: true
    state: enabled
    immediate: true

- name: Allow Elasticsearch transport port from other Elasticsearch nodes
  firewalld:
    rich_rule: "rule family='ipv4' source address='{{ hostvars[item]['ansible_host'] }}' port port='{{ es_transport_port }}' protocol='tcp' accept"
    permanent: true
    state: enabled
    immediate: true
  loop: "{{ groups['elasticsearch'] }}"

# Configure Elasticsearch security
- name: Wait for Elasticsearch to be ready
  wait_for:
    host: "{{ ansible_host }}"
    port: "{{ es_http_port }}"
    delay: 10
    timeout: 60

- name: Check if vault password already works
  uri:
    url: "https://{{ ansible_host }}:{{ es_http_port }}/"
    user: elastic
    password: "{{ vault_elastic_pass }}"
    validate_certs: false
    status_code: 200
  register: es_auth_check
  failed_when: false
  no_log: true

- name: Reset elastic password to get temporary password
  command: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -b
  register: es_reset_output
  no_log: true
  when: es_auth_check.status != 200

- name: Set elastic password from vault via API
  uri:
    url: "https://{{ ansible_host }}:{{ es_http_port }}/_security/user/elastic/_password"
    method: POST
    user: elastic
    password: "{{ es_reset_output.stdout | regex_search('New value: (.+)', '\\1') | first }}"
    body_format: json
    body:
      password: "{{ vault_elastic_pass }}"
    validate_certs: false
    status_code: 200
  no_log: true
  when: es_auth_check.status != 200

- name: Create or update Filebeat writer role with minimal permissions
  uri:
    url: "https://{{ ansible_host }}:{{ es_http_port }}/_security/role/filebeat_writer"
    method: PUT
    user: elastic
    password: "{{ vault_elastic_pass }}"
    body_format: json
    body:
      cluster:
        - monitor
        - read_ilm
        - read_pipeline
        - manage_ilm
        - manage_index_templates
      indices:
        - names:
            - "filebeat-*"
          privileges:
            - create_doc
            - auto_configure
            - view_index_metadata
    validate_certs: false
    status_code: [200, 201]
  no_log: true

- name: Create Filebeat writer user
  uri:
    url: "https://{{ ansible_host }}:{{ es_http_port }}/_security/user/{{ vault_filebeat_user }}"
    method: POST
    user: elastic
    password: "{{ vault_elastic_pass }}"
    body_format: json
    body:
      password: "{{ vault_filebeat_pass }}"
      roles:
        - filebeat_writer
    validate_certs: false
    status_code: [200, 201]
  no_log: true

# Install and configure Filebeat
- name: Add Elastic repository for Filebeat
  copy:
    dest: /etc/yum.repos.d/elastic.repo
    content: |
      [elastic]
      name=Elastic repository
      baseurl=https://artifacts.elastic.co/packages/8.x/yum
      gpgcheck=1
      gpgkey=https://artifacts.elastic.co/GPG-KEY-elasticsearch
      enabled=1
      autorefresh=1
      type=rpm-md

- name: Install Filebeat
  dnf:
    name: filebeat
    state: latest

- name: Deploy Filebeat configuration
  template:
    src: filebeat.yml.j2
    dest: /etc/filebeat/filebeat.yml
    owner: root
    group: root
    mode: "0600"
  notify: restart filebeat

- name: Enable and start Filebeat
  systemd:
    name: filebeat
    enabled: true
    state: started
